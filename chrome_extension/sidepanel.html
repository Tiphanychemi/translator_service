<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darija Translator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <h1>Darija Translator</h1>

    <label for="inputText">Selected Text</label>
    <textarea id="inputText" rows="6"></textarea>

    <button id="translateBtn">Translate</button>

    <label for="outputText">Translation</label>
    <textarea id="outputText" rows="6" readonly></textarea>

    <div class="button-row">
        <button id="speakBtn">Read Aloud</button>
        <button id="stopBtn">Stop</button>
    </div>

    <p id="status"></p>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
