<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darija Translator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <h2>Darija Translator</h2>

    <label for="inputText">Selected Text</label>
    <textarea id="inputText" rows="6" placeholder="Selected text will appear here..."></textarea>

    <button id="translateBtn">Translate</button>

    <label for="outputText">Translation</label>
    <textarea id="outputText" rows="6" readonly placeholder="Translation will appear here..."></textarea>

    <p id="status"></p>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
